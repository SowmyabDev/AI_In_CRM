<!DOCTYPE html>
<html>
<head>
    <title>CRM Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background:#f1f1f1;
            display:flex;
            justify-content:center;
            padding-top:40px;
        }

        .chat-container {
            width: 650px;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .chat-box {
            height: 460px;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .msg {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 80%;
            white-space: pre-wrap;
        }

        .user { background:#c6f5c1; margin-left:auto; text-align:right; }
        .bot { background:#e9e9e9; }

        .input-area {
            display:flex;
            margin-top:15px;
        }

        textarea {
            flex:1;
            height:40px;
            padding:10px;
            resize:none;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button {
            margin-left:10px;
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>

<body>
<div class="chat-container">
    <h2>🤖 CRM Chatbot</h2>

    <!-- ✅ IDs FIXED -->
    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <textarea id="user-input" placeholder="Ask a question..."></textarea>
        <button id="send-btn">Send</button>
    </div>
</div>

<!-- ✅ single JS source -->
<script src="/static/chat.js"></script>
</body>
</html>
