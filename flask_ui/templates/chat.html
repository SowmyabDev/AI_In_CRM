<!DOCTYPE html>
<html>
<head>
    <title>CRM Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background:#f1f1f1;
            display:flex;
            justify-content:center;
            padding-top:40px;
        }

        .chat-container {
            width: 650px;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .chat-box {
            height: 460px;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .msg {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 80%;
            white-space: pre-wrap;
        }

        .user { background:#c6f5c1; margin-left:auto; text-align:right; }
        .bot { background:#e9e9e9; }
        .system {
            background:#fff3cd;
            border:1px solid #ffeeba;
            font-size: 0.9em;
        }

        .input-area {
            display:flex;
            margin-top:15px;
        }

        textarea {
            flex:1;
            height:40px;
            padding:10px;
            resize:none;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button {
            margin-left:10px;
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>

<body>
<div class="chat-container">
    <h2>🤖 CRM Chatbot</h2>
    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <textarea id="userInput" placeholder="Ask a question..."></textarea>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const session_id = localStorage.getItem("session_id");

function appendMessage(text, cls) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = `msg ${cls}`;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    input.value = "";

    try {
        const res = await fetch("/chat_api", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text, session_id })
        });

        const data = await res.json();

        if (data.type === "system") {
            appendMessage("⚠️ " + data.reply, "system");
            if (data.ticket_id) {
                appendMessage("🎫 Ticket ID: " + data.ticket_id, "system");
            }
        } else {
            appendMessage(data.reply, "bot");
        }

    } catch {
        appendMessage("Backend not reachable.", "system");
    }
}

document.getElementById("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});
</script>
</body>
</html>
